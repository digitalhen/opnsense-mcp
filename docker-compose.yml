services:
  opnsense-mcp:
    build: .
    container_name: opnsense-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tunnel

networks:
  tunnel:
    external: true
    name: cloudflared-tunnel-macmini_tunnel
